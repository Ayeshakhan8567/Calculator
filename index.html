<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>

  <div class="card">
    <div class="display" id="display"></div>

    <div class="container">
      <button class="btn" id="ac" onclick="clearAll()">AC</button>
      <button class="btn" id="de" onclick="deleteLast()">DE</button>
      <button class="btn" id="percent" onclick="pressOperator('%')">%</button>
      <button class="btn" id="divide" onclick="pressOperator('/')">/</button>

      <button class="btn" id="seven" onclick="pressButton('7')">7</button>
      <button class="btn" id="eight" onclick="pressButton('8')">8</button>
      <button class="btn" id="nine" onclick="pressButton('9')">9</button>
      <button class="btn" id="multiply" onclick="pressOperator('*')">*</button>

      <button class="btn" id="four" onclick="pressButton('4')">4</button>
      <button class="btn" id="five" onclick="pressButton('5')">5</button>
      <button class="btn" id="six" onclick="pressButton('6')">6</button>
      <button class="btn" id="minus" onclick="pressOperator('-')">-</button>

      <button class="btn" id="one" onclick="pressButton('1')">1</button>
      <button class="btn" id="two" onclick="pressButton('2')">2</button>
      <button class="btn" id="three" onclick="pressButton('3')">3</button>
      <button class="btn" id="plus" onclick="pressOperator('+')">+</button>

      <button class="btn" id="doubleZero" onclick="pressButton('00')">00</button>
      <button class="btn" id="zero" onclick="pressButton('0')">0</button>
      <button class="btn" id="dot" onclick="pressButton('.')">.</button>
      <button class="btn equal" id="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    let cvalue = "";
    let pvalue = "";
    let operator = "";

    function pressButton(num){
      if(num === "." && cvalue === ""){
          cvalue = "0.";
          display.innerText = cvalue;
          return;
      }

      if(num === "." && cvalue.includes(".")){
          return;
      }

      cvalue = cvalue + num;
      display.innerText = cvalue;
    }

    function pressOperator(op){
      if(cvalue === "") return;

      operator = op;
      display.innerText=cvalue + operator;
      pvalue = cvalue;
      cvalue = "";
    }

    function calculate(){
      if(pvalue === "" || cvalue === "") return;

      let value1 = Number(pvalue);
      let value2 = Number(cvalue);
      let result = 0;

      if(operator === "+"){
        result = value1 + value2;
      }
      else if(operator === "-"){
        result = value1 - value2;
      }
      else if(operator === "*"){
        result = value1 * value2;
      }
      else if(operator === "/"){
        if(value2 === 0){
          display.innerText = "Error";
          cvalue = "";
          pvalue = "";
          operator = "";
          return;
        }
        result = value1 / value2;
      }
      else if(operator === "%"){
        result = value1 % value2;
      }

      result = Number(result.toFixed(10));

      display.innerText = result;
      cvalue = result.toString();
      pvalue = "";
      operator = "";
    }

    function clearAll() {
      cvalue = "";
      pvalue = "";
      operator = "";
      display.innerText = "";
    }

    function deleteLast() {
      cvalue = cvalue.slice(0, -1);
      display.innerText = cvalue;
    }
    
    function reset(){
      
    }
  </script>

</body>
</html>
